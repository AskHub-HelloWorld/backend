spring:
  application:
    name: ask-hub
  datasource:
    url: jdbc:postgresql://${POSTGRES_CONTAINER}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect